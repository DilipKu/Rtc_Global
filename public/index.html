<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/rtc_logo.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="google-site-verification" content="MWY3RyY_Az--eK4a8sa_mrqs7-2KR71miR8fGnnGvUU" />
    <style>
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #060913;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .pulse-ring {
        width: 60px;
        height: 60px;
        border: 2px solid #06b6d4;
        border-radius: 50%;
        position: relative;
        animation: pulse 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
      }
      .pulse-ring::after {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 1px solid #06b6d4;
        animation: pulse-ring 2s cubic-bezier(0.24, 0, 0.38, 1) infinite;
        opacity: 0;
      }
      .loader-text {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        font-size: 10px;
        letter-spacing: 0.3em;
        font-weight: 700;
        color: #06b6d4;
        text-transform: uppercase;
      }
      @keyframes pulse {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 15px rgba(6, 182, 212, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(6, 182, 212, 0);
        }
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          transform: scale(2);
          opacity: 0;
        }
      }
    </style>
    <meta
      name="description"
      content="RTC Global Apparels Pvt. Ltd. is a premium B2B wholesale garment distributor in India. Sourcing all leading apparel brands, direct supply chain logistics. Operating across 800+ District Headquarters."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/rtc_logo.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.
 
      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>
      RTC Global Apparels Pvt. Ltd. | B2B Wholesale Garment Sourcing &
      Distribution India
    </title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="preloader">
        <div class="loader-content">
          <div class="pulse-ring"></div>
          <div class="loader-text">RTC GLOBAL APPARELS</div>
        </div>
      </div>
    </div>

  </body>
</html>
